services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: timewin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timewin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-timewin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timewin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timewin_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-timewin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-timewin}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: production
    networks:
      - internal
      - web
    expose:
      - "3000"

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: timewin_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    networks:
      - web

  # Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    container_name: timewin_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
